services:
  backend:
    build: ./backend
    container_name: rotina_backend
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped
    command: sh -c "python manage.py makemigrations routine_app && until python manage.py migrate; do echo 'Banco indisponivel ou DNS nao resolveu; tentando novamente em 3s...'; sleep 3; done && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: rotina_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
